services:
  kafka1:
    image: confluentinc/cp-kafka:8.0.0
    container_name: kafka1
    ports:
      - "9092:9092" # host clients
      - "29092:29092" # other containers
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1 # nodes identity in the quorum
      KAFKA_PROCESS_ROLES: broker,controller # combined mode
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka1:9099" # who's in the controller quorum
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9099 # the sockets the broker binds
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092 # what clients are told to connect back on
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1